services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: vuln
      POSTGRES_PASSWORD: vuln
      POSTGRES_DB: vuln_mgmt
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vuln -d vuln_mgmt"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://vuln:vuln@db:5432/vuln_mgmt
      DEBUG: "false"
      NVD_SYNC_DAYS: "3"
      NVD_MAX_RESULTS: "50"
      ALLOWED_ORIGINS: "http://localhost:8000,http://127.0.0.1:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
